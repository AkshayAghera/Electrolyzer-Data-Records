# Build Trigger Version: 1.1.4
name: Build Electrolyzer Data Records APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Force Sync and Build
        run: |
          # 1. Confirm we are on Node 22
          node -v
          
          # 2. Use the LOCAL capacitor binary (bypass global npx)
          ./node_modules/.bin/cap sync android
          
          # 3. Build the APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Electrolyzer-Records-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk