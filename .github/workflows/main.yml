# Build Trigger Version: 1.1.5-Final
name: Build Electrolyzer Data Records APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Force Android Build
        run: |
          # We bypass 'npx' and use 'node' directly to run the CLI
          node node_modules/@capacitor/cli/bin/capacitor sync android
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Electrolyzer-Records-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk