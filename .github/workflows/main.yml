name: Build Electrolyzer Data Records APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: |
          # If you use a build command like 'npm run build', keep it here. 
          # If you are using plain HTML/JS, we ensure the folder exists.
          mkdir -p www
          cp index.html www/ 2>/dev/null || echo "Using existing build"

      - name: Install Capacitor Android
        run: npm install @capacitor/android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Electrolyzer-Records-v1.0.1
          path: android/app/build/outputs/apk/debug/app-debug.apk