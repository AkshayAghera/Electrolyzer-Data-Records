name: Build Electrolyzer Data Records APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0' # Specific LTS version
          cache: 'npm'

      - name: Force Node Path
        run: |
          echo "NODE_VERSION=$(node -v)"
          echo "PATH=$(npm config get prefix)/bin:$PATH" >> $GITHUB_ENV

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync and Build Android
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Electrolyzer-Records-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk