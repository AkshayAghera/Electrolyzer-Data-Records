# BUILD_ID: 2026-03-11-REAL-LOGO-READY
name: Build Electrolyzer Data Records APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web Assets
        run: npm run build

      - name: Final Android Build
        run: |
          # 1. Run Sync (This links your web code to the Android project)
          node node_modules/@capacitor/cli/bin/capacitor sync android
          
          # 2. Build the actual APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Electrolyzer-Records-v1.1.9
          path: android/app/build/outputs/apk/debug/app-debug.apk