name: Build and Release Electrolyzer APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web Assets
        run: npm run build

      - name: Final Android Build
        run: |
          # Bypassing global npx to avoid the Node version error
          node node_modules/@capacitor/cli/bin/capacitor sync android
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Create GitHub Release
        # This step automatically puts the APK in the "Releases" section
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: Version ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: "Automated release build."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}