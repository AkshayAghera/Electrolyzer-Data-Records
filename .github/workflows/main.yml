# BUILD_ID: 2026-03-11-RELEASE-READY
name: Build and Release Electrolyzer APK

on:
  push:
    tags:
      - 'v*' # This triggers the release when you push a version tag

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Gives GitHub permission to create a release
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web Assets
        run: npm run build

      - name: Final Android Build
        run: |
          node node_modules/@capacitor/cli/bin/capacitor sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: Electrolyzer Data Records ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: "Automated build for Caustic Soda Plant data records."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}