# BUILD_ID: 2026-03-11-FINAL-FORCE
name: Build Electrolyzer Data Records APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # This allows you to start the build manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Web Assets
        run: npm run build

      - name: FORCE_ANDROID_BUILD
        run: |
          # Use the absolute path to the Node 22 engine
          node node_modules/@capacitor/cli/bin/capacitor sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Electrolyzer-Records-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk