<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
            overflow: hidden;
            /* Fades the whole screen out at the 3-second mark */
            animation: screenFadeOut 0.5s ease-in 3s forwards;
        }

        .logo-container {
            text-align: center;
        }

        img {
            max-width: 500px; /* Adjust size to your liking */
            height: auto;
            opacity: 0;
            /* Logo fades in and scales up slightly */
            animation: logoFadeIn 1.5s ease-out 0.2s forwards;
        }

        @keyframes logoFadeIn {
            from { opacity: 0; transform: scale(0.85); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes screenFadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="logo.png" alt="App Logo">
    </div>
</body>
</html>
